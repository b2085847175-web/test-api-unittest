      - role: "assistant"
        content: "宝子，这边给您申请个隐藏福利，送您 1 份赠品小样(下图 8 选 1 )，拍下后告诉我给您加赠，不联系小客服备注无法赠送哦"
      - role: "assistant"
        content: "[图片消息]"
